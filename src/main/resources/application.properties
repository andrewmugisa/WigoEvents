spring.application.name=wigoEvents

# Database config
spring.datasource.url=jdbc:postgresql://localhost:5432/${env.PSQL_DATABASE}
spring.datasource.username=${env.PSQL_USER}
spring.datasource.password=${env.PSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT config
security.jwt.secret-key=${env.JWT_SECRET_KEY}
security.jwt.expiration-time=${env.JWT_EXPIRATION_MS}

# Mail config
spring.mail.host=${env.MAIL_SENDER_SERVER}
spring.mail.port=${env.MAIL_SENDER_PORT}
spring.mail.username=${env.SUPPORT_EMAIL}
spring.mail.password=${env.SUPPORT_EMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${env.MAIL_USE_TLS}

# Server / CORS
server.url=${env.SERVER_URL}
server.ip=${env.SERVER_IP}
server.localhost-url=${env.LOCALHOST_URL}
server.local-test-url=${env.LOCAL_TEST_URL}

# Import .env file optionally
spring.config.import=optional:file:.env[.properties]
