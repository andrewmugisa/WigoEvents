spring.application.name=myDay
spring.datasource.url=jdbc:postgresql://localhost:5432/${env.PSQL_DATABASE}
spring.datasource.username=${env.PSQL_USER}
spring.datasource.password=${env.PSQL_PASSWORD}

#if not using .env use this
#spring.datasource.url="db url"
#spring.datasource.username="db username"
#spring.datasource.password="password"

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.format_sql=true