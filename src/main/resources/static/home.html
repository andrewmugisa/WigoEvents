<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WigoEvents Homepage</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <section id="header">
      <div id="app">
        <h1>My Day Dashboard</h1>
      </div>
    </section>

    <section id="homeContent">
      <div id="welcomeMessage">
        <p>Welcome to My Day! This is your personal dashboard.</p>
      </div>
    </section>

    <section id="userDetails">
      <div id="userProfile">
        <!-- app.js will populate this -->
      </div>
    </section>

    <section id="footer">
      <div id="footerContent">
        <p>&copy; 2026 My Day. All rights reserved.</p>
        <button id="logoutButton">Logout</button>
      </div>
    </section>

    <script src="/js/app.js" defer></script>
    <script src="/js/homeScript.js" defer></script>
  </body>
</html>
